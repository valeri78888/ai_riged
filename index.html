<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTUBER.AR — Amplified Arms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a12;overflow:hidden;height:100vh;width:100vw;font-family:'Rajdhani',sans-serif}
  canvas#scene{position:fixed;inset:0;z-index:0}
  #cam-box{position:fixed;bottom:46px;left:10px;z-index:50;width:280px;height:210px;border-radius:10px;overflow:hidden;border:1px solid rgba(0,255,200,0.25);background:#000;box-shadow:0 0 24px rgba(0,0,0,0.6)}
  #cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);position:absolute;top:0;left:0}
  #cam-box canvas{width:100%;height:100%;position:absolute;top:0;left:0;z-index:2;pointer-events:none}
  #cam-box .lb{position:absolute;top:4px;left:6px;z-index:3;font-family:'Orbitron',sans-serif;font-size:5px;letter-spacing:2px;color:rgba(0,255,200,0.5);background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:2px}
  .ht{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(10,10,18,0.85),transparent)}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;color:#ff6eb4;letter-spacing:2px}.logo span{color:#00ffc8}
  .hr{display:flex;align-items:center;gap:6px}
  #st{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;padding:3px 9px;border:1px solid rgba(0,255,200,0.3);border-radius:12px;color:#00ffc8}
  #st.on{animation:gp 2s ease-in-out infinite}#st.ld{border-color:#ffaa00;color:#ffaa00}
  @keyframes gp{0%,100%{box-shadow:0 0 6px rgba(0,255,200,0.1)}50%{box-shadow:0 0 14px rgba(0,255,200,0.3)}}
  #loadBtn{font-family:'Orbitron',sans-serif;font-size:6px;padding:2px 8px;border:1px solid rgba(255,110,180,0.3);border-radius:8px;color:#ff6eb4;cursor:pointer;background:none}
  .hb{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:6px;display:flex;justify-content:center;gap:18px;background:linear-gradient(0deg,rgba(10,10,18,0.85),transparent);font-family:'Orbitron',sans-serif;font-size:6px;color:rgba(0,255,200,0.3)}.si span{color:#00ffc8;font-weight:700}
  .drop-ov{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.97);transition:opacity 0.5s,visibility 0.5s}
  .drop-ov.h{opacity:0;visibility:hidden;pointer-events:none}
  .drop-ov h1{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ff6eb4;margin-bottom:8px}.drop-ov h1 span{color:#00ffc8}
  .drop-zone{width:380px;height:170px;border:2px dashed rgba(255,110,180,0.4);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin:14px 0}
  .drop-zone:hover,.drop-zone.drag{border-color:#ff6eb4;background:rgba(255,110,180,0.05)}
  .drop-zone .icon{font-size:40px;margin-bottom:6px}.drop-zone .txt{font-family:'Orbitron',sans-serif;font-size:10px;color:#ff6eb4;letter-spacing:2px}.drop-zone .sub{font-size:9px;color:rgba(255,255,255,0.2);margin-top:4px}
  .drop-ov p{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;max-width:400px;line-height:1.7;margin-top:10px}
  .drop-ov a{color:#00ffc8;text-decoration:none}
  #lm{font-family:'Orbitron',sans-serif;font-size:8px;color:#ffaa00;margin-top:10px;text-align:center;line-height:2}
  input[type=file]{display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.11/lib/three-vrm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.4.1633559476/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632432234/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>
<canvas id="scene"></canvas>
<div id="cam-box"><div class="lb">СКЕЛЕТ</div><video id="vid" autoplay playsinline></video><canvas id="skelCan"></canvas></div>
<div class="ht"><div class="logo">VTUBER<span>.AR</span></div><div class="hr"><button id="loadBtn" onclick="document.getElementById('vf').click()">СМЕНИТЬ VRM</button><input type="file" id="vf" accept=".vrm" onchange="handleFile(this.files[0])"><div id="st">WAIT</div></div></div>
<div class="hb"><div class="si">FPS <span id="xf">0</span></div></div>
<div class="drop-ov" id="ov"><h1>VTUBER<span>.AR</span></h1>
  <div class="drop-zone" id="dz" onclick="document.getElementById('vf2').click()"><div class="icon">📁</div><div class="txt">ПЕРЕТАЩИ .VRM СЮДА</div><div class="sub">или нажми чтобы выбрать</div></div>
  <input type="file" id="vf2" accept=".vrm" onchange="handleFile(this.files[0])">
  <p><a href="https://github.com/madjin/vrm-samples" target="_blank">GitHub: vrm-samples</a> · <a href="https://hub.vroid.com/en/models" target="_blank">VRoid Hub</a> · <a href="https://vroid.com/en/studio" target="_blank">VRoid Studio</a></p>
  <div id="lm"></div>
</div>

<script>
var vid=document.getElementById('vid'),skelCan=document.getElementById('skelCan'),cx=skelCan.getContext('2d');
var sW=280,sH=210,currentVrm=null,Kal=window.Kalidokit,holisticReady=false,idleTime=0;

// Drop
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});
function handleFile(f){
  if(!f)return;if(!f.name.toLowerCase().endsWith('.vrm')){setLog('<span style="color:#ff3e8a">Нужен .VRM!</span>');return}
  setLog('Загружаю...');
  new THREE.GLTFLoader().load(URL.createObjectURL(f),function(g){
    THREE.VRM.from(g).then(function(v){if(currentVrm)scene.remove(currentVrm.scene);currentVrm=v;scene.add(v.scene);v.scene.rotation.y=Math.PI;setLog('OK ✓');startTracking()}).catch(function(e){setLog('<span style="color:#ff3e8a">'+e.message+'</span>')})
  },undefined,function(){setLog('<span style="color:#ff3e8a">Ошибка</span>')});
}

// ===== SKELETON ON CAMERA (with smoothing) =====
var sLm=null,sLH=null,sRH=null;
function lp(a,b,t){return a+(b-a)*t}
function smP(raw){if(!raw)return null;var n=raw.length,f=0.55;if(!sLm||sLm.length!==n){sLm=[];for(var i=0;i<n;i++)sLm.push({x:raw[i].x,y:raw[i].y,v:raw[i].visibility||0});return sLm}for(var i=0;i<n;i++){var v=raw[i].visibility||0;if(v>0.3){sLm[i].x=lp(sLm[i].x,raw[i].x,f);sLm[i].y=lp(sLm[i].y,raw[i].y,f)}sLm[i].v=v}return sLm}
function smH(p,r){if(!r)return null;var n=r.length,f=0.5;if(!p||p.length!==n){p=[];for(var i=0;i<n;i++)p.push({x:r[i].x,y:r[i].y});return p}for(var i=0;i<n;i++){p[i].x=lp(p[i].x,r[i].x,f);p[i].y=lp(p[i].y,r[i].y,f)}return p}
var BC=[[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[15,17],[15,19],[15,21],[17,19],[12,14],[14,16],[16,18],[16,20],[16,22],[18,20],[23,25],[25,27],[27,29],[27,31],[29,31],[24,26],[26,28],[28,30],[28,32],[30,32]];
var HC=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
var F_OUT=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,10];
var F_LE=[263,249,390,373,374,380,381,382,362,263],F_RE=[33,7,163,144,145,153,154,155,133,33];
var F_LO=[61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,61];
var F_LI=[78,95,88,178,87,14,317,402,318,324,308,415,310,311,312,13,82,81,80,191,78];
var F_LB=[276,283,282,295,300],F_RB=[46,53,52,65,70],F_NS=[168,6,197,195,5,4,1,19,94,2,164];
var COL={t:'#00b4ff',la:'#ff3e8a',ra:'#ffaa00',ll:'#aa55ff',rl:'#33ff88',lh:'#ff6eb4',rh:'#ffc846',f:'#00ffc8',ey:'#00ddff',li:'#ff3e8a'};
function bCol(i,j){if([11,13,15,17,19,21].indexOf(i)!==-1&&[11,13,15,17,19,21].indexOf(j)!==-1)return COL.la;if([12,14,16,18,20,22].indexOf(i)!==-1&&[12,14,16,18,20,22].indexOf(j)!==-1)return COL.ra;if([23,25,27,29,31].indexOf(i)!==-1&&[23,25,27,29,31].indexOf(j)!==-1)return COL.ll;if([24,26,28,30,32].indexOf(i)!==-1&&[24,26,28,30,32].indexOf(j)!==-1)return COL.rl;return COL.t}
function jCol(i){if([11,13,15,17,19,21].indexOf(i)!==-1)return COL.la;if([12,14,16,18,20,22].indexOf(i)!==-1)return COL.ra;if([25,27,29,31].indexOf(i)!==-1)return COL.ll;if([26,28,30,32].indexOf(i)!==-1)return COL.rl;return COL.t}
function mx(v){return(1-v)*sW}function my(v){return v*sH}
function fP(face,idx,col,a,w){if(!face)return;cx.strokeStyle=col;cx.lineWidth=w;cx.globalAlpha=a;cx.lineJoin='round';cx.lineCap='round';cx.beginPath();var s=0;for(var i=0;i<idx.length;i++){var p=face[idx[i]];if(!p)continue;if(!s){cx.moveTo(mx(p.x),my(p.y));s=1}else cx.lineTo(mx(p.x),my(p.y))}cx.stroke()}

function drawSkel(results){
  cx.clearRect(0,0,sW,sH);
  var pose=smP(results.poseLandmarks);
  if(pose){
    cx.lineCap='round';
    for(var b=0;b<BC.length;b++){var i=BC[b][0],j=BC[b][1];if(pose[i].v>0.4&&pose[j].v>0.4){var c=bCol(i,j);cx.strokeStyle=c;cx.lineWidth=4;cx.globalAlpha=0.1;cx.beginPath();cx.moveTo(mx(pose[i].x),my(pose[i].y));cx.lineTo(mx(pose[j].x),my(pose[j].y));cx.stroke();cx.lineWidth=1.8;cx.globalAlpha=0.85;cx.beginPath();cx.moveTo(mx(pose[i].x),my(pose[i].y));cx.lineTo(mx(pose[j].x),my(pose[j].y));cx.stroke()}}
    // Spine
    var ls=pose[11],rs=pose[12],lh=pose[23],rh=pose[24];
    if(ls.v>0.4&&rs.v>0.4&&lh.v>0.4&&rh.v>0.4){cx.strokeStyle='#fff';cx.lineWidth=1.2;cx.globalAlpha=0.2;cx.beginPath();cx.moveTo((mx(lh.x)+mx(rh.x))/2,(my(lh.y)+my(rh.y))/2);cx.lineTo((mx(ls.x)+mx(rs.x))/2,(my(ls.y)+my(rs.y))/2);if(pose[0].v>0.4)cx.lineTo(mx(pose[0].x),my(pose[0].y));cx.stroke()}
    // Joints
    for(var i=11;i<33;i++){if(pose[i].v>0.4){var c=jCol(i),r=[11,12,23,24].indexOf(i)!==-1?3.5:[13,14,25,26].indexOf(i)!==-1?2.5:2;cx.fillStyle=c;cx.globalAlpha=0.12;cx.beginPath();cx.arc(mx(pose[i].x),my(pose[i].y),r+2,0,6.283);cx.fill();cx.globalAlpha=0.9;cx.beginPath();cx.arc(mx(pose[i].x),my(pose[i].y),r,0,6.283);cx.fill();cx.fillStyle='#fff';cx.globalAlpha=0.7;cx.beginPath();cx.arc(mx(pose[i].x),my(pose[i].y),r*0.3,0,6.283);cx.fill()}}
    // Head
    var nose=pose[0],le=pose[7],re=pose[8];
    if(nose.v>0.4&&le.v>0.3&&re.v>0.3){var hr=Math.abs(mx(re.x)-mx(le.x))*0.6;cx.strokeStyle=COL.f;cx.lineWidth=1;cx.globalAlpha=0.25;cx.beginPath();cx.ellipse(mx(nose.x),my(nose.y)-hr*0.05,hr,hr*1.1,0,0,6.283);cx.stroke()}
  }
  // Hands
  function dH(raw,prev,col){var h=smH(prev,raw);if(!h)return prev;cx.strokeStyle=col;cx.lineWidth=1;cx.globalAlpha=0.7;for(var b=0;b<HC.length;b++){cx.beginPath();cx.moveTo(mx(h[HC[b][0]].x),my(h[HC[b][0]].y));cx.lineTo(mx(h[HC[b][1]].x),my(h[HC[b][1]].y));cx.stroke()}cx.fillStyle=col;cx.globalAlpha=0.85;for(var i=0;i<h.length;i++){var r=i===0?3:([4,8,12,16,20].indexOf(i)!==-1?2:1.2);cx.beginPath();cx.arc(mx(h[i].x),my(h[i].y),r,0,6.283);cx.fill()}return h}
  sLH=dH(results.leftHandLandmarks,sLH,COL.lh);sRH=dH(results.rightHandLandmarks,sRH,COL.rh);
  // Face
  var face=results.faceLandmarks;
  if(face&&face.length>0){fP(face,F_OUT,COL.f,0.18,0.8);fP(face,F_LE,COL.ey,0.4,1);fP(face,F_RE,COL.ey,0.4,1);fP(face,F_LB,COL.f,0.25,0.7);fP(face,F_RB,COL.f,0.25,0.7);fP(face,F_LO,COL.li,0.35,0.8);fP(face,F_LI,COL.li,0.2,0.6);fP(face,F_NS,COL.f,0.15,0.6);if(face.length>473){cx.fillStyle=COL.ey;cx.globalAlpha=0.5;for(var e=468;e<474;e++){if(!face[e])continue;cx.beginPath();cx.arc(mx(face[e].x),my(face[e].y),2,0,6.283);cx.fill()}}}
  cx.globalAlpha=1;
}
function resizeSkel(){var r=skelCan.parentElement.getBoundingClientRect();sW=r.width;sH=r.height;skelCan.width=sW;skelCan.height=sH}

// ===== THREE =====
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('scene'),antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(window.devicePixelRatio);renderer.outputEncoding=THREE.sRGBEncoding;
var scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a12);
var camera=new THREE.PerspectiveCamera(28,window.innerWidth/window.innerHeight,0.1,100);camera.position.set(0,1.35,2.8);
var controls=new THREE.OrbitControls(camera,renderer.domElement);controls.target.set(0,1,0);controls.enableDamping=true;controls.update();
scene.add(new THREE.AmbientLight(0xffffff,0.6));var dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(1,2,1);scene.add(dl);scene.add(new THREE.DirectionalLight(0xff6eb4,0.2).translateX(-1).translateY(1));
var grid=new THREE.GridHelper(10,10,0x00ffc8,0x111122);grid.material.opacity=0.08;grid.material.transparent=true;scene.add(grid);

// ===== VRM RIG — AMPLIFIED ARMS =====
function rigR(n,r,d,l){if(!currentVrm)return;var b=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName[n]);if(!b)return;b.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler((r.x||0)*(d||1),(r.y||0)*(d||1),(r.z||0)*(d||1))),l||0.3)}
function rigP(n,p,d,l){if(!currentVrm)return;var b=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName[n]);if(!b)return;b.position.lerp(new THREE.Vector3((p.x||0)*(d||1),(p.y||0)*(d||1),(p.z||0)*(d||1)),l||0.3)}

function onResults(results){
  drawSkel(results);
  if(!currentVrm)return;
  var fl=results.faceLandmarks,p2d=results.poseLandmarks,p3d=results.ea;

  // Face — works well, keep same
  if(fl){var fr=Kal.Face.solve(fl,{runtime:'mediapipe',video:vid});if(fr){
    rigR("Head",fr.head,0.85,0.45);
    rigR("Neck",fr.head,0.35,0.3);
    var B=currentVrm.blendShapeProxy;if(B){var P=THREE.VRMSchema.BlendShapePresetName;
      var eyes=Kal.Face.stabilizeBlink({l:fr.eye.l,r:fr.eye.r},fr.head.y);
      B.setValue(P.BlinkL,1-eyes.l);B.setValue(P.BlinkR,1-eyes.r);
      var m=fr.mouth.shape;
      B.setValue(P.A,Math.min(1,(m.A||0)*1.3));B.setValue(P.E,Math.min(1,(m.E||0)*1.1));
      B.setValue(P.I,Math.min(1,(m.I||0)*1.1));B.setValue(P.O,Math.min(1,(m.O||0)*1.2));B.setValue(P.U,Math.min(1,(m.U||0)*1.2));
  }}}

  // Pose — AMPLIFIED ARMS
  if(p2d&&p3d){var pr=Kal.Pose.solve(p3d,p2d,{runtime:'mediapipe',video:vid});if(pr){
    // Hips
    rigR("Hips",pr.Hips.rotation,0.8,0.35);
    rigP("Hips",{x:pr.Hips.worldPosition.x,y:pr.Hips.worldPosition.y+1,z:-pr.Hips.worldPosition.z},1,0.1);
    // Spine — more
    rigR("Spine",pr.Spine,0.7,0.4);
    rigR("Chest",pr.Spine,0.35,0.3);

    // *** ARMS — AMPLIFIED (dampener > 1.0 = bigger range) ***
    rigR("RightUpperArm",pr.RightUpperArm, 1.15, 0.55);
    rigR("RightLowerArm",pr.RightLowerArm, 1.1, 0.55);
    rigR("LeftUpperArm", pr.LeftUpperArm,  1.15, 0.55);
    rigR("LeftLowerArm", pr.LeftLowerArm,  1.1, 0.55);

    // Legs
    rigR("LeftUpperLeg",pr.LeftUpperLeg,0.6,0.3);
    rigR("LeftLowerLeg",pr.LeftLowerLeg,0.6,0.3);
    rigR("RightUpperLeg",pr.RightUpperLeg,0.6,0.3);
    rigR("RightLowerLeg",pr.RightLowerLeg,0.6,0.3);
  }}

  // Hands + fingers
  if(results.leftHandLandmarks){var lhr=Kal.Hand.solve(results.leftHandLandmarks,'Left');if(lhr){rigR('LeftHand',lhr.LeftWrist,0.6,0.4);var fn=['Ring','Index','Little','Thumb','Middle'],jn=['Proximal','Intermediate','Distal'];for(var f=0;f<fn.length;f++)for(var j=0;j<jn.length;j++){var bn='Left'+fn[f]+jn[j];if(lhr[bn])rigR(bn,lhr[bn],fn[f]==='Thumb'?0.7:1,0.4)}}}
  if(results.rightHandLandmarks){var rhr=Kal.Hand.solve(results.rightHandLandmarks,'Right');if(rhr){rigR('RightHand',rhr.RightWrist,0.6,0.4);var fn2=['Ring','Index','Little','Thumb','Middle'],jn2=['Proximal','Intermediate','Distal'];for(var f=0;f<fn2.length;f++)for(var j=0;j<jn2.length;j++){var bn='Right'+fn2[f]+jn2[j];if(rhr[bn])rigR(bn,rhr[bn],fn2[f]==='Thumb'?0.7:1,0.4)}}}

  document.getElementById('st').textContent='LIVE';document.getElementById('st').className='on';
}

function applyIdle(dt){if(!currentVrm)return;idleTime+=dt;var sp=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Spine);if(sp){var e=new THREE.Euler().setFromQuaternion(sp.quaternion);e.x+=Math.sin(idleTime*1.6)*0.005;e.z+=Math.sin(idleTime*0.5)*0.003;sp.quaternion.setFromEuler(e)}var hd=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Head);if(hd){var eh=new THREE.Euler().setFromQuaternion(hd.quaternion);eh.x+=Math.sin(idleTime*0.8+1)*0.002;eh.z+=Math.sin(idleTime*0.6)*0.001;hd.quaternion.setFromEuler(eh)}}

function startTracking(){
  if(holisticReady){document.getElementById('ov').classList.add('h');return}
  setLog('Камера...');
  navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}})
  .then(function(s){vid.srcObject=s;return vid.play()})
  .then(function(){resizeSkel();setLog('Holistic...');
    var h=new Holistic({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.4.1633559476/'+f}});
    h.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.75,minTrackingConfidence:0.75,refineFaceLandmarks:true});
    h.onResults(onResults);setLog('Запуск...');
    return new Camera(vid,{onFrame:function(){return h.send({image:vid})},width:640,height:480}).start()})
  .then(function(){holisticReady=true;setLog('OK ✓');setTimeout(function(){document.getElementById('ov').classList.add('h')},300)})
  .catch(function(e){setLog('<span style="color:#ff3e8a">'+e.message+'</span>')});
}

var clock=new THREE.Clock(),fc=0,lt=0;
function animate(){requestAnimationFrame(animate);var dt=clock.getDelta();fc++;var now=performance.now();if(now-lt>=1000){document.getElementById('xf').textContent=fc;fc=0;lt=now}controls.update();applyIdle(dt);if(currentVrm)currentVrm.update(dt);renderer.render(scene,camera)}
animate();
window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);resizeSkel()});
function setLog(t){var l=document.getElementById('lm');l.style.display='block';l.innerHTML=t}
</script>
