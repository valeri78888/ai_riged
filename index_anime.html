<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTUBER.AR — Rig Overlay + Tuned</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a12;overflow:hidden;height:100vh;width:100vw;font-family:'Rajdhani',sans-serif}
  canvas#scene{position:fixed;inset:0;z-index:0}

  /* Camera + skeleton overlay */
  #cam-box{
    position:fixed;bottom:48px;left:10px;z-index:50;
    width:260px;height:195px;border-radius:10px;overflow:hidden;
    border:1px solid rgba(0,255,200,0.25);background:#000;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
  }
  #cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);position:absolute;top:0;left:0}
  #cam-box canvas{width:100%;height:100%;position:absolute;top:0;left:0;z-index:2;pointer-events:none}
  #cam-box .lb{position:absolute;top:4px;left:6px;z-index:3;font-family:'Orbitron',sans-serif;font-size:5px;letter-spacing:2px;color:rgba(0,255,200,0.5);background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:2px}

  .ht{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(10,10,18,0.85),transparent)}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;color:#ff6eb4;letter-spacing:2px}.logo span{color:#00ffc8}
  .hr{display:flex;align-items:center;gap:6px}
  #st{font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;padding:3px 9px;border:1px solid rgba(0,255,200,0.3);border-radius:12px;color:#00ffc8}
  #st.on{animation:gp 2s ease-in-out infinite}#st.ld{border-color:#ffaa00;color:#ffaa00}
  @keyframes gp{0%,100%{box-shadow:0 0 6px rgba(0,255,200,0.1)}50%{box-shadow:0 0 14px rgba(0,255,200,0.3)}}
  #loadBtn{font-family:'Orbitron',sans-serif;font-size:6px;padding:2px 8px;border:1px solid rgba(255,110,180,0.3);border-radius:8px;color:#ff6eb4;cursor:pointer;background:none}
  .hb{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:6px;display:flex;justify-content:center;gap:18px;background:linear-gradient(0deg,rgba(10,10,18,0.85),transparent);font-family:'Orbitron',sans-serif;font-size:6px;color:rgba(0,255,200,0.3)}.si span{color:#00ffc8;font-weight:700}

  .drop-ov{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.97);transition:opacity 0.5s,visibility 0.5s}
  .drop-ov.h{opacity:0;visibility:hidden;pointer-events:none}
  .drop-ov h1{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ff6eb4;margin-bottom:8px}.drop-ov h1 span{color:#00ffc8}
  .drop-zone{width:380px;height:180px;border:2px dashed rgba(255,110,180,0.4);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin:16px 0}
  .drop-zone:hover,.drop-zone.drag{border-color:#ff6eb4;background:rgba(255,110,180,0.05)}
  .drop-zone .icon{font-size:42px;margin-bottom:6px}
  .drop-zone .txt{font-family:'Orbitron',sans-serif;font-size:10px;color:#ff6eb4;letter-spacing:2px}
  .drop-zone .sub{font-size:9px;color:rgba(255,255,255,0.2);margin-top:4px}
  .drop-ov p{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;max-width:400px;line-height:1.7;margin-top:10px}
  .drop-ov a{color:#00ffc8;text-decoration:none}
  #lm{font-family:'Orbitron',sans-serif;font-size:8px;color:#ffaa00;margin-top:10px;text-align:center;line-height:2}
  input[type=file]{display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.133.1/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.11/lib/three-vrm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.4.1633559476/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632432234/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>
<canvas id="scene"></canvas>

<!-- Camera with skeleton overlay -->
<div id="cam-box">
  <div class="lb">СКЕЛЕТ</div>
  <video id="vid" autoplay playsinline></video>
  <canvas id="skelCan"></canvas>
</div>

<div class="ht">
  <div class="logo">VTUBER<span>.AR</span></div>
  <div class="hr">
    <button id="loadBtn" onclick="document.getElementById('vf').click()">СМЕНИТЬ VRM</button>
    <input type="file" id="vf" accept=".vrm" onchange="handleFile(this.files[0])">
    <div id="st">WAIT</div>
  </div>
</div>
<div class="hb"><div class="si">FPS <span id="xf">0</span></div></div>

<div class="drop-ov" id="ov">
  <h1>VTUBER<span>.AR</span></h1>
  <div class="drop-zone" id="dz" onclick="document.getElementById('vf2').click()">
    <div class="icon">📁</div>
    <div class="txt">ПЕРЕТАЩИ .VRM СЮДА</div>
    <div class="sub">или нажми чтобы выбрать</div>
  </div>
  <input type="file" id="vf2" accept=".vrm" onchange="handleFile(this.files[0])">
  <p>Скачай VRM: <a href="https://github.com/madjin/vrm-samples" target="_blank">GitHub: madjin/vrm-samples</a> (CC0)<br>
    <a href="https://hub.vroid.com/en/models" target="_blank">VRoid Hub</a> · <a href="https://vroid.com/en/studio" target="_blank">VRoid Studio</a>
  </p>
  <div id="lm"></div>
</div>

<script>
var vid = document.getElementById('vid');
var skelCan = document.getElementById('skelCan');
var skelCx = skelCan.getContext('2d');
var sW = 260, sH = 195;
var currentVrm = null;
var Kal = window.Kalidokit;
var holisticReady = false;
var idleTime = 0;

// ===== DROP ZONE =====
var dz = document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag')});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});

function handleFile(f){
  if(!f)return;
  if(!f.name.toLowerCase().endsWith('.vrm')){setLog('<span style="color:#ff3e8a">Нужен .VRM!</span>');return}
  setLog('Загружаю: '+f.name+'...');
  var loader=new THREE.GLTFLoader();
  loader.load(URL.createObjectURL(f),function(gltf){
    THREE.VRM.from(gltf).then(function(vrm){
      if(currentVrm)scene.remove(currentVrm.scene);
      currentVrm=vrm;scene.add(vrm.scene);vrm.scene.rotation.y=Math.PI;
      setLog('OK ✓');startTracking();
    }).catch(function(err){setLog('<span style="color:#ff3e8a">Ошибка: '+err.message+'</span>')});
  },undefined,function(){setLog('<span style="color:#ff3e8a">Ошибка файла</span>')});
}

// ============================================================
// SKELETON RIG DRAWING ON CAMERA (from working version)
// ============================================================
var BODY_CONN=[
  [11,12],[11,23],[12,24],[23,24],
  [11,13],[13,15],[15,17],[15,19],[15,21],[17,19],
  [12,14],[14,16],[16,18],[16,20],[16,22],[18,20],
  [23,25],[25,27],[27,29],[27,31],[29,31],
  [24,26],[26,28],[28,30],[28,32],[30,32]
];
var HAND_CONN=[
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
];
var FACE_OUTLINE=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,10];
var FACE_LEYE=[263,249,390,373,374,380,381,382,362,263];
var FACE_REYE=[33,7,163,144,145,153,154,155,133,33];
var FACE_LIPS=[61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,61];

var COL={bone:'#00ffc8',la:'#ff3e8a',ra:'#ffaa00',ll:'#aa55ff',rl:'#33ff88',lh:'#ff6eb4',rh:'#ffc846',face:'#00ffc8',eye:'#00ddff',lip:'#ff3e8a'};

function boneCol(i,j){
  if([11,13,15,17,19,21].indexOf(i)!==-1&&[11,13,15,17,19,21].indexOf(j)!==-1)return COL.la;
  if([12,14,16,18,20,22].indexOf(i)!==-1&&[12,14,16,18,20,22].indexOf(j)!==-1)return COL.ra;
  if([23,25,27,29,31].indexOf(i)!==-1&&[23,25,27,29,31].indexOf(j)!==-1)return COL.ll;
  if([24,26,28,30,32].indexOf(i)!==-1&&[24,26,28,30,32].indexOf(j)!==-1)return COL.rl;
  return COL.bone;
}

function drawSkeleton(results){
  skelCx.clearRect(0,0,sW,sH);
  var pose=results.poseLandmarks;
  var lHand=results.leftHandLandmarks;
  var rHand=results.rightHandLandmarks;
  var face=results.faceLandmarks;

  // Body bones
  if(pose){
    for(var b=0;b<BODY_CONN.length;b++){
      var i=BODY_CONN[b][0],j=BODY_CONN[b][1];
      var a=pose[i],bb=pose[j];
      if((a.visibility||0)>0.3&&(bb.visibility||0)>0.3){
        skelCx.strokeStyle=boneCol(i,j);skelCx.lineWidth=2;skelCx.globalAlpha=0.8;skelCx.lineCap='round';
        skelCx.beginPath();skelCx.moveTo((1-a.x)*sW,a.y*sH);skelCx.lineTo((1-bb.x)*sW,bb.y*sH);skelCx.stroke();
      }
    }
    // Body joints
    for(var i=11;i<33;i++){
      var p=pose[i];
      if((p.visibility||0)>0.3){
        skelCx.fillStyle=COL.bone;skelCx.globalAlpha=0.9;
        skelCx.beginPath();skelCx.arc((1-p.x)*sW,p.y*sH,3,0,6.283);skelCx.fill();
      }
    }
    // Head ellipse
    var nose=pose[0],le=pose[7],re=pose[8];
    if((nose.visibility||0)>0.3&&(le.visibility||0)>0.2&&(re.visibility||0)>0.2){
      var hr=Math.abs((1-re.x)*sW-(1-le.x)*sW)*0.6;
      skelCx.strokeStyle=COL.face;skelCx.lineWidth=1;skelCx.globalAlpha=0.3;
      skelCx.beginPath();skelCx.ellipse((1-nose.x)*sW,nose.y*sH,hr,hr*1.1,0,0,6.283);skelCx.stroke();
    }
  }

  // Hands
  function drawHand(hand, col){
    if(!hand) return;
    skelCx.strokeStyle=col;skelCx.lineWidth=1;skelCx.globalAlpha=0.7;
    for(var b=0;b<HAND_CONN.length;b++){
      var a=hand[HAND_CONN[b][0]],bb=hand[HAND_CONN[b][1]];
      skelCx.beginPath();skelCx.moveTo((1-a.x)*sW,a.y*sH);skelCx.lineTo((1-bb.x)*sW,bb.y*sH);skelCx.stroke();
    }
    skelCx.fillStyle=col;skelCx.globalAlpha=0.8;
    for(var i=0;i<hand.length;i++){
      var r=[4,8,12,16,20].indexOf(i)!==-1?2.5:1.5;
      skelCx.beginPath();skelCx.arc((1-hand[i].x)*sW,hand[i].y*sH,r,0,6.283);skelCx.fill();
    }
  }
  drawHand(lHand, COL.lh);
  drawHand(rHand, COL.rh);

  // Face contours
  function drawFacePath(landmarks, indices, col, alpha, width){
    if(!landmarks) return;
    skelCx.strokeStyle=col;skelCx.lineWidth=width;skelCx.globalAlpha=alpha;skelCx.lineJoin='round';
    skelCx.beginPath();
    for(var i=0;i<indices.length;i++){
      var p=landmarks[indices[i]];if(!p)continue;
      if(i===0)skelCx.moveTo((1-p.x)*sW,p.y*sH);
      else skelCx.lineTo((1-p.x)*sW,p.y*sH);
    }
    skelCx.stroke();
  }
  drawFacePath(face, FACE_OUTLINE, COL.face, 0.2, 0.8);
  drawFacePath(face, FACE_LEYE, COL.eye, 0.4, 1);
  drawFacePath(face, FACE_REYE, COL.eye, 0.4, 1);
  drawFacePath(face, FACE_LIPS, COL.lip, 0.35, 0.8);

  // Iris
  if(face&&face.length>473){
    skelCx.fillStyle=COL.eye;skelCx.globalAlpha=0.5;
    for(var e=468;e<474;e++){if(!face[e])continue;skelCx.beginPath();skelCx.arc((1-face[e].x)*sW,face[e].y*sH,2,0,6.283);skelCx.fill()}
  }
  skelCx.globalAlpha=1;
}

function resizeSkel(){
  var r=skelCan.parentElement.getBoundingClientRect();
  sW=r.width;sH=r.height;skelCan.width=sW;skelCan.height=sH;
}

// ============================================================
// THREE.JS
// ============================================================
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('scene'),antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(window.devicePixelRatio);renderer.outputEncoding=THREE.sRGBEncoding;

var scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a12);
var camera=new THREE.PerspectiveCamera(28,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,1.35,2.8);
var controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,1,0);controls.enableDamping=true;controls.update();

scene.add(new THREE.AmbientLight(0xffffff,0.6));
var dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(1,2,1);scene.add(dl);
scene.add(new THREE.DirectionalLight(0xff6eb4,0.2).translateX(-1).translateY(1));
var grid=new THREE.GridHelper(10,10,0x00ffc8,0x111122);grid.material.opacity=0.08;grid.material.transparent=true;scene.add(grid);

// ============================================================
// VRM RIG — FURTHER TUNED
// ============================================================
function rigR(name,rot,damp,lerp){
  if(!currentVrm)return;
  var bone=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName[name]);
  if(!bone)return;
  var q=new THREE.Quaternion().setFromEuler(new THREE.Euler((rot.x||0)*(damp||1),(rot.y||0)*(damp||1),(rot.z||0)*(damp||1)));
  bone.quaternion.slerp(q,lerp||0.3);
}
function rigP(name,pos,damp,lerp){
  if(!currentVrm)return;
  var bone=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName[name]);
  if(!bone)return;
  bone.position.lerp(new THREE.Vector3((pos.x||0)*(damp||1),(pos.y||0)*(damp||1),(pos.z||0)*(damp||1)),lerp||0.3);
}

function onResults(results){
  // Draw skeleton on camera
  drawSkeleton(results);

  if(!currentVrm) return;
  var fl=results.faceLandmarks,p2d=results.poseLandmarks,p3d=results.ea;

  // Face
  if(fl){
    var fr=Kal.Face.solve(fl,{runtime:'mediapipe',video:vid});
    if(fr){
      rigR("Head",fr.head,0.85,0.45);
      rigR("Neck",fr.head,0.35,0.3);
      var B=currentVrm.blendShapeProxy;
      if(B){
        var P=THREE.VRMSchema.BlendShapePresetName;
        var eyes=Kal.Face.stabilizeBlink({l:fr.eye.l,r:fr.eye.r},fr.head.y);
        B.setValue(P.BlinkL,1-eyes.l);B.setValue(P.BlinkR,1-eyes.r);
        var m=fr.mouth.shape;
        B.setValue(P.A,Math.min(1,(m.A||0)*1.3));
        B.setValue(P.E,Math.min(1,(m.E||0)*1.1));
        B.setValue(P.I,Math.min(1,(m.I||0)*1.1));
        B.setValue(P.O,Math.min(1,(m.O||0)*1.2));
        B.setValue(P.U,Math.min(1,(m.U||0)*1.2));
      }
    }
  }

  // Pose
  if(p2d&&p3d){
    var pr=Kal.Pose.solve(p3d,p2d,{runtime:'mediapipe',video:vid});
    if(pr){
      rigR("Hips",pr.Hips.rotation,0.8,0.35);
      rigP("Hips",{x:pr.Hips.worldPosition.x,y:pr.Hips.worldPosition.y+1,z:-pr.Hips.worldPosition.z},1,0.1);
      rigR("Spine",pr.Spine,0.6,0.35);
      rigR("Chest",pr.Spine,0.3,0.25);
      // Arms — further softened, faster response
      rigR("RightUpperArm",pr.RightUpperArm,0.75,0.45);
      rigR("RightLowerArm",pr.RightLowerArm,0.75,0.45);
      rigR("LeftUpperArm",pr.LeftUpperArm,0.75,0.45);
      rigR("LeftLowerArm",pr.LeftLowerArm,0.75,0.45);
      // Legs
      rigR("LeftUpperLeg",pr.LeftUpperLeg,0.6,0.3);
      rigR("LeftLowerLeg",pr.LeftLowerLeg,0.6,0.3);
      rigR("RightUpperLeg",pr.RightUpperLeg,0.6,0.3);
      rigR("RightLowerLeg",pr.RightLowerLeg,0.6,0.3);
    }
  }

  // Hands + fingers
  if(results.leftHandLandmarks){
    var lhr=Kal.Hand.solve(results.leftHandLandmarks,'Left');
    if(lhr){
      rigR('LeftHand',lhr.LeftWrist,0.6,0.4);
      var fn=['Ring','Index','Little','Thumb','Middle'],jn=['Proximal','Intermediate','Distal'];
      for(var f=0;f<fn.length;f++)for(var j=0;j<jn.length;j++){var bn='Left'+fn[f]+jn[j];if(lhr[bn])rigR(bn,lhr[bn],fn[f]==='Thumb'?0.7:1,0.4)}
    }
  }
  if(results.rightHandLandmarks){
    var rhr=Kal.Hand.solve(results.rightHandLandmarks,'Right');
    if(rhr){
      rigR('RightHand',rhr.RightWrist,0.6,0.4);
      var fn2=['Ring','Index','Little','Thumb','Middle'],jn2=['Proximal','Intermediate','Distal'];
      for(var f=0;f<fn2.length;f++)for(var j=0;j<jn2.length;j++){var bn='Right'+fn2[f]+jn2[j];if(rhr[bn])rigR(bn,rhr[bn],fn2[f]==='Thumb'?0.7:1,0.4)}
    }
  }

  document.getElementById('st').textContent='LIVE';document.getElementById('st').className='on';
}

// Idle
function applyIdle(dt){
  if(!currentVrm)return;idleTime+=dt;
  var spine=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Spine);
  if(spine){var e=new THREE.Euler().setFromQuaternion(spine.quaternion);e.x+=Math.sin(idleTime*1.6)*0.005;e.z+=Math.sin(idleTime*0.5)*0.003;spine.quaternion.setFromEuler(e)}
  var head=currentVrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Head);
  if(head){var eh=new THREE.Euler().setFromQuaternion(head.quaternion);eh.x+=Math.sin(idleTime*0.8+1)*0.002;eh.z+=Math.sin(idleTime*0.6)*0.001;head.quaternion.setFromEuler(eh)}
}

// Tracking
function startTracking(){
  if(holisticReady){document.getElementById('ov').classList.add('h');return}
  setLog('Камера...');
  navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}})
  .then(function(stream){vid.srcObject=stream;return vid.play()})
  .then(function(){
    resizeSkel();
    setLog('Камера ✓<br>Holistic...<br><span style="font-size:7px;color:rgba(255,255,255,0.12)">~15-30 сек</span>');
    var h=new Holistic({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.4.1633559476/'+f}});
    h.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.75,minTrackingConfidence:0.75,refineFaceLandmarks:true});
    h.onResults(onResults);
    setLog('Запуск...');
    var c=new Camera(vid,{onFrame:function(){return h.send({image:vid})},width:640,height:480});
    return c.start();
  })
  .then(function(){holisticReady=true;setLog('OK ✓');setTimeout(function(){document.getElementById('ov').classList.add('h')},300)})
  .catch(function(e){setLog('<span style="color:#ff3e8a">'+e.message+'</span>')});
}

// Render
var clock=new THREE.Clock(),fc=0,lt=0;
function animate(){
  requestAnimationFrame(animate);var dt=clock.getDelta();fc++;
  var now=performance.now();if(now-lt>=1000){document.getElementById('xf').textContent=fc;fc=0;lt=now}
  controls.update();applyIdle(dt);if(currentVrm)currentVrm.update(dt);renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);resizeSkel()});

function setLog(t){var l=document.getElementById('lm');l.style.display='block';l.innerHTML=t}
</script>
</body>
</html>
